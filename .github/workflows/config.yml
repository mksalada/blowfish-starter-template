name: Get Blowfish Config

on:
  workflow_dispatch:

jobs:
  download-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download config zip
        run: |
          curl -L -o config-default.zip https://github.com/nunocoracao/blowfish/releases/latest/download/config-default.zip

      - name: Clean existing config
        run: |
          rm -rf config/_default
          mkdir -p config/_default

      - name: Extract config properly
        run: |
          unzip config-default.zip -d temp-config
          cp -r temp-config/config/_default/* config/_default/
          rm -rf temp-config config-default.zip

      - name: Commit updated config
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add config/_default

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Blowfish default config"
            git push
          fi
